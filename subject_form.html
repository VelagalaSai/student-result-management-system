{% extends "base.html" %}
{% block title %}Add Subject{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Add Subject</h1>
  <a href="{{ url_for('subjects') }}" class="btn btn-ghost">← Back</a>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label>Subject Code <span class="required">*</span></label>
      <input type="text" name="subject_code" placeholder="e.g. CS501" required />
    </div>
    <div class="form-group">
      <label>Subject Name <span class="required">*</span></label>
      <input type="text" name="subject_name" placeholder="e.g. Data Structures" required />
    </div>
    <div class="form-group">
      <label>Branch <span class="required">*</span></label>
      <select name="branch" required>
        <option value="">Select Branch</option>
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="IT">IT</option>
        <option value="MECH">MECH</option>
        <option value="CIVIL">CIVIL</option>
        <option value="AIDS">AIDS</option>
        <option value="AIML">AIML</option>
      </select>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Subject</button>
      <a href="{{ url_for('subjects') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
