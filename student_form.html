{% extends "base.html" %}
{% block title %}Add Student{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Add Student</h1>
  <a href="{{ url_for('students') }}" class="btn btn-ghost">← Back</a>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label>Name <span class="required">*</span></label>
      <input type="text" name="name" placeholder="e.g. Sai Bhaskari" required />
    </div>
    <div class="form-group">
      <label>Roll Number <span class="required">*</span></label>
      <input type="text" name="roll_number" placeholder="e.g. 21CSE001" required />
    </div>
    <div class="form-group">
      <label>Branch <span class="required">*</span></label>
      <select name="branch" required>
        <option value="">Select Branch</option>
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="IT">IT</option>
        <option value="MECH">MECH</option>
        <option value="CIVIL">CIVIL</option>
        <option value="AIDS">AIDS</option>
        <option value="AIML">AIML</option>
      </select>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Student</button>
      <a href="{{ url_for('students') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
