{% extends "base.html" %}
{% block title %}Enter Result{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Enter Result</h1>
  <a href="{{ url_for('results') }}" class="btn btn-ghost">← Back</a>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label>Student <span class="required">*</span></label>
      <select name="student_id" required>
        <option value="">Select Student</option>
        {% for s in students %}
        <option value="{{ s.id }}">{{ s.name }} — {{ s.roll_number }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Subject <span class="required">*</span></label>
      <select name="subject_id" required>
        <option value="">Select Subject</option>
        {% for s in subjects %}
        <option value="{{ s.id }}">{{ s.subject_code }} — {{ s.subject_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Marks <span class="required">*</span></label>
      <input type="number" name="marks" min="0" max="100" placeholder="e.g. 85" required />
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Result</button>
      <a href="{{ url_for('results') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
