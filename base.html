<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SRMS{% endblock %}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
    .navbar { background: #2c3e50; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .navbar a { color: white; text-decoration: none; margin-right: 1.5rem; font-size: 14px; }
    .navbar a:hover { color: #3498db; }
    .navbar .brand { font-size: 18px; font-weight: bold; color: white; }
    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 24px; }
    .btn { padding: 8px 16px; border-radius: 4px; text-decoration: none; font-size: 14px; cursor: pointer; border: none; }
    .btn-primary { background: #3498db; color: white; }
    .btn-primary:hover { background: #2980b9; }
    .btn-ghost { background: transparent; border: 1px solid #ccc; color: #333; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: 8px; padding: 1.5rem; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .stat-card .number { font-size: 36px; font-weight: bold; color: #3498db; }
    .stat-card .label { font-size: 14px; color: #777; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
    th { background: #2c3e50; color: white; padding: 12px; text-align: left; font-size: 14px; }
    td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
    tr:hover { background: #f9f9f9; }
    .badge { background: #e8f4fd; color: #2980b9; padding: 3px 8px; border-radius: 12px; font-size: 12px; }
    .form-card { background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); max-width: 600px; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-actions { margin-top: 1.5rem; display: flex; gap: 1rem; }
    .empty-state { text-align: center; padding: 3rem; color: #777; background: white; border-radius: 8px; }
    .required { color: red; }
  </style>
</head>
<body>
  <nav class="navbar">
    <span class="brand">SRMS</span>
    <div>
      <a href="{{ url_for('index') }}">Dashboard</a>
      <a href="{{ url_for('students') }}">Students</a>
      <a href="{{ url_for('subjects') }}">Subjects</a>
      <a href="{{ url_for('results') }}">Results</a>
      <a href="{{ url_for('reports') }}">Reports</a>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
